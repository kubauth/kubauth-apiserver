name: build-artifact

# Build and push the multi-arch image on every push to this branch.
# Delegates the actual work to `make docker-buildx`, which builds for
# $(PLATFORMS) and pushes to $(REGISTRY)/exec/kindex.
on:
  push:
    branches:
      - main
  # Allow manual runs from the Actions tab / `gh workflow run`.
  workflow_dispatch:

# Required repo configuration (Settings > Secrets and variables > Actions):
#   - Variable REGISTRY            e.g. quay.io/kubocd   (becomes $(REGISTRY))
#   - Secrets  REGISTRY_USERNAME, REGISTRY_PASSWORD      (push to that registry)
#   - Optional Variable DOCKERHUB_USERNAME + Secret DOCKERHUB_TOKEN (base-image pulls)
env:
  REGISTRY: ${{ vars.REGISTRY }}

permissions:
  contents: write

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0          # goreleaser needs tags + full history

      # ubuntu-latest already ships make, go and docker; this only adds the
      # bits `make docker-buildx` needs for cross-platform builds.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Cross-platform emulation for the linux/arm64 + linux/amd64 build.
      # `make docker-buildx` creates its own `kubauth-apiserver-builder`, so no
      # setup-buildx-action step is needed here.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Authenticate to Docker Hub so the BuildKit/QEMU base images
      # (moby/buildkit, etc.) pull reliably instead of hitting anonymous
      # rate limits / timeouts. Skipped automatically if the var is unset.
      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derive the registry host (e.g. quay.io) from REGISTRY for the login.
      - name: Resolve registry host
        id: reg
        run: echo "host=${REGISTRY%%/*}" >> "$GITHUB_OUTPUT"

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.reg.outputs.host }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: make chart
        run: make chart REGISTRY="${REGISTRY}"

      - name: make docker-buildx
        run: make docker-buildx REGISTRY="${REGISTRY}"

